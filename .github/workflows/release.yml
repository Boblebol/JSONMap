name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        run: pnpm tauri build

      - name: List artifacts for debugging
        run: |
          echo "Listing DMG directory:"
          ls -R src-tauri/target/release/bundle/dmg || echo "DMG directory not found"
          echo "Listing release directory:"
          ls -F src-tauri/target/release/ || echo "Release directory not found"

      - name: Rename artifacts for predictable links
        run: |
          # Find the DMG and copy it to a name without version
          # Tauri v2 artifacts are usually in src-tauri/target/release/bundle/dmg/
          # but we check recursively just in case.
          SEARCH_DIR="src-tauri/target/release/bundle/dmg"
          if [ -d "$SEARCH_DIR" ]; then
            cd "$SEARCH_DIR"
            for f in *.dmg; do
              case "$f" in
                *_x64.dmg|*_x86_64.dmg)
                  cp "$f" "JSONMap_x64.dmg"
                  echo "Created JSONMap_x64.dmg from $f"
                  ;;
                *_aarch64.dmg)
                  cp "$f" "JSONMap_aarch64.dmg"
                  echo "Created JSONMap_aarch64.dmg from $f"
                  ;;
                *)
                  # If name is ambiguous, just copy as x64 as fallback
                  cp "$f" "JSONMap_x64.dmg"
                  echo "Created JSONMap_x64.dmg from $f (fallback)"
                  ;;
              esac
            done
          else
            echo "Error: Search directory $SEARCH_DIR not found!"
            exit 1
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
