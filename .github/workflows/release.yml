name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-13, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app
        run: pnpm tauri build

      - name: List artifacts for debugging
        run: |
          echo "Listing DMG directory:"
          ls -R src-tauri/target/release/bundle/dmg || echo "DMG directory not found"
          echo "Listing release directory:"
          ls -F src-tauri/target/release/ || echo "Release directory not found"

      - name: Rename artifacts for predictable links
        run: |
          # Use find to locate any DMGs regardless of exact path
          # and copy them to the root of the release assets with clean names
          mkdir -p release-artifacts
          
          # Find DMGs and copy them
          find src-tauri/target/release/bundle/dmg -name "*.dmg" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          
          cd release-artifacts
          for f in *.dmg; do
            if [[ "$f" == *"_x64.dmg" ]] || [[ "$f" == *"_x86_64.dmg" ]]; then
              cp "$f" "JSONMap_x64.dmg"
              echo "Aliased $f to JSONMap_x64.dmg"
            elif [[ "$f" == *"_aarch64.dmg" ]]; then
              cp "$f" "JSONMap_aarch64.dmg"
              echo "Aliased $f to JSONMap_aarch64.dmg"
            else
              # Universal or unknown - alias as x64 for the default link
              cp "$f" "JSONMap_x64.dmg"
              echo "Aliased $f to JSONMap_x64.dmg (default)"
            fi
          done
          ls -R .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            release-artifacts/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
